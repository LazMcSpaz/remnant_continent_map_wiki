#:schema node_modules/wrangler/config-schema.json
# Cloudflare Worker (static assets) config for the Remnant Continent atlas.
#
# The Git build runs `npm run build` (Root directory = web) → web/dist, then the
# deploy command `npx wrangler versions upload` uploads the assets below.
# `versions upload` takes NO --assets flag, so the asset directory MUST be
# declared here. (The earlier "use the --assets flag, not an [assets] block"
# note applied to `wrangler deploy`, which is no longer the deploy command —
# with `versions upload` the missing [assets] block is what caused the
# "Missing entry-point to Worker script or to assets directory" failure.)

name = "remnant-continent-atlas"
compatibility_date = "2025-05-01"

[assets]
directory = "./dist"
