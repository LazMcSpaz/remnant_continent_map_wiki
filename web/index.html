<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive worldbuilding atlas for The Remnant Continent — Phase 1 map spine."
    />
    <title>Remnant Continent — Atlas</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>The Remnant Continent</h1>
        <span class="phase">Phase 1 · map spine</span>
        <button id="name-toggle" class="name-toggle" type="button" hidden>
          Names: new-world
        </button>
        <div id="io-toolbar" class="io-toolbar" role="group"
             aria-label="Save and import/export" hidden></div>
        <button id="sign-out" class="name-toggle" type="button" hidden>Sign out</button>
        <span id="status" role="status" aria-live="polite">Loading basemap…</span>
      </header>
      <div class="map-area">
        <div id="map" aria-label="Map of the Remnant Continent (North America)"></div>
        <!-- Top-left stacked controls; anchored within the map area, below the header. -->
        <div class="map-controls-tl">
          <!-- Editor toolbar stays free-floating (it's a row of tool buttons). -->
          <div id="editor-toolbar" class="editor-toolbar" role="toolbar"
               aria-label="Feature editing tools" hidden></div>
          <!-- Dockable tool panels (collapsible, organized in one column). -->
          <div id="layers-panel" class="layers-panel" role="group"
               aria-label="Map layers" hidden></div>
          <div id="climate-control" class="climate-control" role="group"
               aria-label="Derived climate overlay" hidden></div>
          <div id="terrain-brush-panel" class="layers-panel" role="group"
               aria-label="Terrain brush" hidden></div>
          <div id="surface-brush-panel" class="layers-panel" role="group"
               aria-label="Surface brush" hidden></div>
          <div id="sim-control" class="sim-control" role="group"
               aria-label="Flow simulation" hidden></div>
          <div id="isochrone-panel" class="layers-panel" role="group"
               aria-label="Reachability isochrones" hidden></div>
          <div id="factions-panel" class="layers-panel" role="group"
               aria-label="Factions" hidden></div>
          <div id="corridors-panel" class="layers-panel" role="group"
               aria-label="Corridors" hidden></div>
          <div id="faction-dashboard-panel" class="layers-panel" role="group"
               aria-label="Faction dashboard" hidden></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
